# Devnet defaults.
# Loaded by xin.Xin when xin.env=devnet. Sits between hardcoded defaults and
# custom.properties — anything set in custom.properties (or via the
# docker-entrypoint envsubst from conf/templates/docker.properties) wins.

# Network identity. Per-node values are templated into custom.properties from
# iep-docker-dev/environment/devnet/env in the docker dev flow; these defaults
# are for non-docker users running iep-node directly with -Dxin.env=devnet.
xin.defaultPeers=node-1;node-2;node-3
xin.peerServerPort=8775
xin.defaultPeerPort=8775
xin.apiServerPort=9876

# Forging - produce blocks as soon as the deadline passes. Mainnet uses 20.
# Generator.java:212 uses (>= curTime - FORGING_DELAY) as a sentinel, so
# the safe minimum is 1, not 0.
xin.forgingDelay=1
xin.forgingSpeedup=10

# Consensus - single-forger devnet doesn't need cross-confirmation.
xin.numberOfForkConfirmations=0

# Peer transport - local container links are sub-ms; cut from 10s/20s.
xin.connectTimeout=2000
xin.readTimeout=3000

# DoS filter - devnet test scripts hammer the API; don't throttle them.
xin.enablePeerServerDoSFilter=false
xin.peerServerDoSFilter.maxRequestsPerSec=1000

# DB - log slow tx earlier so issues surface during tests.
xin.transactionLogThreshold=2000
